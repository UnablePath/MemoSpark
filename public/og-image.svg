<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" aria-labelledby="title desc" role="img" viewBox="0 0 1200 630"><title id="title">MemoSpark</title><desc id="desc">Student life, in one place.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0c0e13"/><stop offset="100%" stop-color="#111620"/></linearGradient><linearGradient id="spark" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#63f2a2"/><stop offset="100%" stop-color="#41b93c"/></linearGradient></defs><rect width="1200" height="630" fill="url(#bg)"/><circle cx="220" cy="190" r="64" fill="url(#spark)" opacity=".18"/><circle cx="980" cy="470" r="96" fill="#1a2230" opacity=".8"/><g><text x="0" y="0" fill="#41b93c" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700" transform="translate(120 150)">S</text><text x="88" y="0" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" letter-spacing="2" transform="translate(120 150)">MEMOSPARK</text><text x="0" y="120" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700" transform="translate(120 150)">Student life, in one place.</text><text x="0" y="188" fill="#a4adbb" font-family="Arial, Helvetica, sans-serif" font-size="30" transform="translate(120 150)">Tasks, timetables, study groups, crashout, streaks, and AI support.</text></g></svg>